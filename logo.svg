<svg width="128" height="128" viewBox="0 0 128 128" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <rect width="128" height="128" rx="16" fill="#2D2D2D"/>
  
  <!-- Gradient definitions -->
  <defs>
    <linearGradient id="leftGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#4A9EFF;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#357ABD;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="rightGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FF6B6B;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#C44569;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="accentGradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#FFD93D;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#FFA737;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Left Panel -->
  <g>
    <!-- Panel background with rounded corners -->
    <rect x="14" y="20" width="44" height="88" rx="6" fill="url(#leftGradient)" opacity="0.9"/>
    
    <!-- Folder icon 1 -->
    <g transform="translate(20, 30)">
      <path d="M 0 2 L 8 2 L 10 4 L 26 4 L 26 14 L 0 14 Z" fill="#FFFFFF" opacity="0.95"/>
      <rect x="0" y="4" width="26" height="10" fill="#FFFFFF" opacity="0.8"/>
    </g>
    
    <!-- File lines 1 -->
    <rect x="24" y="48" width="24" height="2" rx="1" fill="#FFFFFF" opacity="0.7"/>
    <rect x="24" y="52" width="20" height="2" rx="1" fill="#FFFFFF" opacity="0.6"/>
    
    <!-- Folder icon 2 -->
    <g transform="translate(20, 60)">
      <path d="M 0 2 L 8 2 L 10 4 L 26 4 L 26 14 L 0 14 Z" fill="#FFFFFF" opacity="0.85"/>
      <rect x="0" y="4" width="26" height="10" fill="#FFFFFF" opacity="0.7"/>
    </g>
    
    <!-- File lines 2 -->
    <rect x="24" y="78" width="24" height="2" rx="1" fill="#FFFFFF" opacity="0.6"/>
    <rect x="24" y="82" width="18" height="2" rx="1" fill="#FFFFFF" opacity="0.5"/>
  </g>
  
  <!-- Right Panel -->
  <g>
    <!-- Panel background with rounded corners -->
    <rect x="70" y="20" width="44" height="88" rx="6" fill="url(#rightGradient)" opacity="0.9"/>
    
    <!-- Folder icon 1 -->
    <g transform="translate(76, 30)">
      <path d="M 0 2 L 8 2 L 10 4 L 26 4 L 26 14 L 0 14 Z" fill="#FFFFFF" opacity="0.95"/>
      <rect x="0" y="4" width="26" height="10" fill="#FFFFFF" opacity="0.8"/>
    </g>
    
    <!-- File lines 1 -->
    <rect x="80" y="48" width="24" height="2" rx="1" fill="#FFFFFF" opacity="0.7"/>
    <rect x="80" y="52" width="20" height="2" rx="1" fill="#FFFFFF" opacity="0.6"/>
    
    <!-- Folder icon 2 -->
    <g transform="translate(76, 60)">
      <path d="M 0 2 L 8 2 L 10 4 L 26 4 L 26 14 L 0 14 Z" fill="#FFFFFF" opacity="0.85"/>
      <rect x="0" y="4" width="26" height="10" fill="#FFFFFF" opacity="0.7"/>
    </g>
    
    <!-- File lines 2 -->
    <rect x="80" y="78" width="24" height="2" rx="1" fill="#FFFFFF" opacity="0.6"/>
    <rect x="80" y="82" width="18" height="2" rx="1" fill="#FFFFFF" opacity="0.5"/>
  </g>
  
  <!-- Center divider with accent -->
  <rect x="62" y="24" width="4" height="80" rx="2" fill="url(#accentGradient)"/>
  
  <!-- Subtle arrows indicating independence -->
  <g opacity="0.4">
    <!-- Left arrow pointing left -->
    <path d="M 30 12 L 26 16 L 30 20" stroke="#FFFFFF" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
    <!-- Right arrow pointing right -->
    <path d="M 98 12 L 102 16 L 98 20" stroke="#FFFFFF" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
  </g>
</svg>
